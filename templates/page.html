{% extends "base.html" %}

{% block main %}

<!-- ── Page header ───────────────────────────────────────────── -->
<section class="page-hero">
  <div class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="{{ base_url }}/" class="breadcrumb-link">Home</a>
      <span class="breadcrumb-sep" aria-hidden="true">›</span>
      <span class="breadcrumb-current" aria-current="page">{{ page_title }}</span>
    </nav>
    <h1 class="page-hero-title">{{ page_title }}</h1>
  </div>
</section>

<!-- ── Article content ───────────────────────────────────────── -->
<section class="content-section">
  <div class="container container--narrow">
    <article class="prose">
      {{ content }}
    </article>
  </div>
</section>

<!-- ── Q&A section ───────────────────────────────────────────── -->
{% if qa_items %}
<section class="qa-section" id="qa">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Questions &amp; Answers</h2>
      <p class="section-subtitle">Frequently asked questions about this topic.</p>
    </div>
    <div class="qa-list" role="list">
      {% for item in qa_items %}
      <div class="qa-item" role="listitem">
        <button class="qa-trigger" aria-expanded="false">
          <span class="qa-question-text">{{ item.question }}</span>
          <span class="qa-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="5 8 10 13 15 8"></polyline>
            </svg>
          </span>
        </button>
        <div class="qa-answer" hidden>
          <div class="qa-answer-inner">{{ item.answer }}</div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endif %}

<!-- ── Page navigation ───────────────────────────────────────── -->
<div class="page-footer-nav">
  <div class="container">
    <a href="{{ base_url }}/" class="btn btn-outline btn-sm">
      <span aria-hidden="true">←</span> Back to Home
    </a>
  </div>
</div>

{% endblock %}
